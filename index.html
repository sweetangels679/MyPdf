    <script>
        let images = [];
        const MAX_SIZE = 1 * 1024 * 1024; // 1MB

        // --- Core Image Logic ---
        const fileInput = document.getElementById('file-input');
        fileInput.onchange = (e) => handleFiles(e.target.files);

        async function handleFiles(files) {
            if (images.length + files.length > 50) return alert("Maximum 50 images allowed.");
            
            for (let file of files) {
                let processedData = await compressImage(file);
                images.push({ 
                    id: Math.random(), 
                    src: processedData, 
                    rotation: 0 
                });
            }
            renderGrid();
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Downscale if image is huge
                        const maxDim = 1800;
                        if (width > maxDim || height > maxDim) {
                            if (width > height) {
                                height = (height / width) * maxDim;
                                width = maxDim;
                            } else {
                                width = (width / height) * maxDim;
                                height = maxDim;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Quality adjustment to stay under 1MB
                        let quality = 0.85;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(dataUrl);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function renderGrid() {
            const grid = document.getElementById('image-grid');
            const empty = document.getElementById('empty-state');
            
            if (images.length > 0) empty.classList.add('hidden');
            else empty.classList.remove('hidden');

            grid.innerHTML = images.map((img, i) => `
                <div class="relative group aspect-[3/4] bg-slate-50 rounded-2xl overflow-hidden border border-blue-100 shadow-sm transition-all hover:shadow-md">
                    <img src="${img.src}" style="transform: rotate(${img.rotation}deg)" class="rotate-preview w-full h-full object-cover">
                    
                    <div class="absolute inset-0 bg-blue-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-between p-2">
                        <div class="flex justify-between">
                            <button onclick="rotateImg(${i})" class="bg-white/20 hover:bg-blue-600 text-white p-2 rounded-xl backdrop-blur-md transition-colors">
                                <i data-lucide="rotate-cw" class="w-4 h-4"></i>
                            </button>
                            <button onclick="removeImg(${i})" class="bg-white/20 hover:bg-red-600 text-white p-2 rounded-xl backdrop-blur-md transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="flex items-center justify-between bg-white p-2 rounded-xl shadow-lg">
                            <button onclick="move(${i}, -1)" ${i === 0 ? 'disabled' : ''} class="text-blue-600 font-black px-2 disabled:opacity-20">←</button>
                            <span class="text-[10px] font-black text-slate-800">PAGE ${i+1}</span>
                            <button onclick="move(${i}, 1)" ${i === images.length-1 ? 'disabled' : ''} class="text-blue-600 font-black px-2 disabled:opacity-20">→</button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function rotateImg(idx) {
            images[idx].rotation = (images[idx].rotation + 90) % 360;
            renderGrid();
        }

        function move(idx, dir) {
            const tmp = images[idx];
            images[idx] = images[idx+dir];
            images[idx+dir] = tmp;
            renderGrid();
        }

        function removeImg(idx) {
            images.splice(idx, 1);
            renderGrid();
        }

        function clearAll() {
            if(confirm("Discard all images?")) { images = []; renderGrid(); }
        }

        // --- PDF Generation Logic ---
        async function generatePdf() {
            if (images.length === 0) return alert("Please upload images first.");
            
            const btn = document.getElementById('main-btn');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<div class="loader w-5 h-5 border-2 border-white rounded-full"></div> Creating PDF...`;

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const watermark = document.getElementById('watermark-text').value;
                const pageNumbers = document.getElementById('page-numbers').checked;

                for (let i = 0; i < images.length; i++) {
                    if (i > 0) doc.addPage();
                    const img = images[i];
                    
                    const pw = doc.internal.pageSize.getWidth();
                    const ph = doc.internal.pageSize.getHeight();
                    
                    // jsPDF addImage takes rotation as degrees
                    // To handle rotation properly we swap width/height if 90/270
                    const isRotated = img.rotation === 90 || img.rotation === 270;
                    
                    const props = doc.getImageProperties(img.src);
                    const imgW = isRotated ? props.height : props.width;
                    const imgH = isRotated ? props.width : props.height;
                    
                    const ratio = Math.min(pw / imgW, ph / imgH);
                    const drawW = imgW * ratio;
                    const drawH = imgH * ratio;
                    
                    const x = (pw - drawW) / 2;
                    const y = (ph - drawH) / 2;

                    doc.addImage(img.src, 'JPEG', x, y, drawW, drawH, null, 'NONE', img.rotation);

                    // Watermark: Center, 20% Opacity, Arial 20pt
                    if (watermark) {
                        doc.saveGraphicsState();
                        doc.setGState(new doc.GState({ opacity: 0.2 }));
                        doc.setFont("helvetica", "bold"); // Arial fallback in jspdf
                        doc.setFontSize(20);
                        doc.setTextColor(150, 150, 150);
                        doc.text(watermark, pw/2, ph/2, { align: 'center', angle: 45 });
                        doc.restoreGraphicsState();
                    }

                    // Page Numbers
                    if (pageNumbers) {
                        doc.setFontSize(10);
                        doc.setTextColor(200);
                        doc.text(`${i+1} / ${images.length}`, pw-15, ph-10, { align: 'right' });
                    }
                }

                const name = document.getElementById('pdf-name').value || 'MyPdf_Document';
                doc.save(`${name}.pdf`);
                
                document.getElementById('share-buttons').classList.remove('hidden');
                btn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i> Saved Successfully!`;
                setTimeout(() => { btn.innerHTML = originalHtml; lucide.createIcons(); }, 4000);

            } catch (err) {
                console.error(err);
                alert("Failed to generate PDF. Try fewer images.");
                btn.innerHTML = originalHtml;
            } finally {
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        function shareLink(type) {
            const url = window.location.href;
            if(type === 'copy') {
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Website Link Copied!");
            } else {
                window.location.href = `mailto:?subject=Free PDF Utility&body=I found this great tool to make PDFs from images: ${url}`;
            }
        }

        lucide.createIcons();
    </script>
</body>
